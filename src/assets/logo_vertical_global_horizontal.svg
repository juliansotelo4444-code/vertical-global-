<svg width="100%" viewBox="0 0 680 120" role="img" style="" xmlns="http://www.w3.org/2000/svg"><defs><mask id="imagine-text-gaps-0zlree" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="120" fill="white"/><rect x="101.33333587646484" y="20" width="168.71875" height="41.333335876464844" fill="black" rx="2"/><rect x="296" y="20" width="129.0625" height="41.333335876464844" fill="black" rx="2"/><rect x="102" y="61.333335876464844" width="203.78125" height="20" fill="black" rx="2"/></mask></defs>
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo Vertical Global horizontal</title>
